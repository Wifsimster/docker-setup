name: x-ai-weekly-bot

services:
  x-ai-weekly-bot:
    image: ghcr.io/wifsimster/x-ai-weekly-bot:latest
    container_name: x-ai-weekly-bot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - WEB_PORT=3000
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qS http://localhost:3000/healthz 2>&1 | grep -q 'HTTP/'"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.x-ai-weekly-bot.entrypoints=websecure"
      - "traefik.http.routers.x-ai-weekly-bot.rule=Host(`x-ai-weekly-bot.${DOMAIN}`)"
      - "traefik.http.services.x-ai-weekly-bot.loadBalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    cap_drop:
      - ALL
    networks:
      lan:

volumes:
  bot-data:

networks:
  lan:
    external: true
