name: ghostfolio

services:
  ghostfolio:
    image: docker.io/ghostfolio/ghostfolio:latest
    container_name: ghostfolio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    init: true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - PORT=3333
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3333/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      # Entrypoint
      - "traefik.http.routers.ghostfolio.entrypoints=websecure"

      # Router
      - "traefik.http.routers.ghostfolio.rule=Host(`ghostfolio.${DOMAIN}`)"

      # Service
      - "traefik.http.services.ghostfolio.loadBalancer.server.port=3333"

      # Protect with tinyauth — Ghostfolio has its own auth, but keep homelab SSO in front
      - "traefik.http.routers.ghostfolio.middlewares=tinyauth@docker"

      # Watchtower automatic update
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      lan:
      backend:

  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: ghostfolio-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["postgres", "-c", "password_encryption=md5"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=md5
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=Europe/Paris
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      backend:

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: ghostfolio-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      backend:

volumes:
  postgres-data:
  redis-data:

networks:
  lan:
    external: true
  backend:
    internal: true
