name: discord-bridge

services:
  discord-bridge:
    container_name: discord-bridge
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - CHANNEL_CHAT=${CHANNEL_CHAT}
      - CHANNEL_MEDIA=${CHANNEL_MEDIA}
      - CHANNEL_MAISON=${CHANNEL_MAISON}
      - CHANNEL_DOCS=${CHANNEL_DOCS}
      - CHANNEL_INFRA=${CHANNEL_INFRA}
    networks:
      - lan

networks:
  lan:
    external: true
