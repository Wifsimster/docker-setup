name: discord-bridge

services:
  discord-bridge:
    container_name: discord-bridge
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - CHANNEL_CHAT=${CHANNEL_CHAT}
      - CHANNEL_DEV=${CHANNEL_DEV}
      - DEV_AGENTS_URL=${DEV_AGENTS_URL}
      - N8N_RESET_WEBHOOK_URL=${N8N_RESET_WEBHOOK_URL:-}
      - CHANNEL_GENERAL=${CHANNEL_GENERAL:-0}
      - N8N_GENERAL_WEBHOOK_URL=${N8N_GENERAL_WEBHOOK_URL:-}
    networks:
      - lan

networks:
  lan:
    external: true
