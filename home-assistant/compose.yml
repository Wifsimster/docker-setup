name: Home Assistant

services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    depends_on:
      mosquitto:
        condition: service_healthy
      matter-server:
        condition: service_healthy
    volumes:
      - /opt/docker/home-assistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    # Zigbee dongle mapped via stable by-id path as a device (not a volume bind).
    # A volume bind silently creates an empty DIRECTORY when the node is missing at
    # boot (Docker starts before udev enumerates USB), which then blocks the real
    # char device and breaks ZHA with "[Errno 21] Is a directory". `devices:` instead
    # fails fast and retries via restart policy until the node exists.
    devices:
      - /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_16f8365619b6ed1180a7da0ea8669f5d-if00-port0:/dev/ttyUSB0
    restart: unless-stopped
    # Note: no-new-privileges not set — privileged mode required for device control
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    environment:
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:8123/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      # Watchtower auto-update DISABLED for HA: it recreates the container outside of
      # compose (losing device passthrough / depends_on) and HA `stable` can ship
      # breaking changes. Update deliberately: `docker compose pull && docker compose up -d`.
      # (Incident 2026-07-11: Watchtower recreation orphaned the container -> 502.)
      - com.centurylinklabs.watchtower.enable=false

    # Host network required for direct LAN access (Broadlink UDP, mDNS, device discovery)
    # Traefik routing handled via file provider (traefik/config/home-assistant.yml)
    network_mode: host


  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    user: "1883:1883"
    security_opt:
      - no-new-privileges:true
    # MQTT ports — used by LAN IoT devices (not internet-facing)
    # Ensure these ports are NOT forwarded on the router/firewall
    ports:
      - 1883:1883
      - 1884:1884
    volumes:
      - /opt/docker/home-assistant/mosquitto/config:/mosquitto/config:ro
      - /opt/docker/home-assistant/mosquitto/data:/mosquitto/data
      - /opt/docker/home-assistant/mosquitto/log:/mosquitto/log
    environment:
      TZ: ${TZ}
    healthcheck:
      test: ["CMD-SHELL", "pidof mosquitto || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # Excluded from Watchtower alongside HA (stateful broker; update with the stack).
      - com.centurylinklabs.watchtower.enable=false
    networks:
      lan:


  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - apparmor:unconfined # Needed for Bluetooth via dbus
      - no-new-privileges:true
    volumes:
      - /opt/docker/home-assistant/matter-server/data:/data/
      - /run/dbus:/run/dbus:ro

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5580', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      # Excluded from Watchtower alongside HA (Matter fabric state; update with the stack).
      - com.centurylinklabs.watchtower.enable=false

    # Force CHIP SDK to use the real LAN interface for mDNS (not a Docker bridge)
    command: --storage-path /data --paa-root-cert-dir /data/credentials --primary-interface ens18

    # Required for mDNS to work correctly
    network_mode: host

    # Accessible at http://192.168.0.237:5580/

networks:
  lan:
    external: true
