# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  packages: !include_dir_named packages

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml

# n8n AI agent webhook
rest_command:
  n8n_domotique:
    url: "https://n8n.battistella.ovh/webhook/domotique"
    method: POST
    content_type: "application/json"
    payload: '{{ payload }}'
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.18.0.0/16  # lanv6 network entire subnet
    - 172.26.0.0/16  # lan network entire subnet

bluetooth:

# Notification groups
notify:
  - name: all_mobiles
    platform: group
    services:
      - service: mobile_app_25069ptebg
      - service: mobile_app_21081111rg
      - service: mobile_app_2306epn60g
      - service: mobile_app_mi_8
# Homelab: puissance des équipements non mesurés individuellement
# = compteur baie (tasmota) - somme des prises mesurées
template:
  - sensor:
      - name: "Homelab autres non mesurés"
        unique_id: homelab_autres_non_mesures_puissance
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "{{ states('sensor.tasmota_energy_power') not in ['unknown','unavailable'] }}"
        state: >
          {% set total = states('sensor.tasmota_energy_power') | float(0) %}
          {% set ns = namespace(s=0) %}
          {% set metered = [
            'sensor.smart_plug_mini_puissance',
            'sensor.nas_puissance',
            'sensor.switch_poe_puissance',
            'sensor.firewall_puissance',
            'sensor.freebox_puissance',
            'sensor.unvr_puissance'] %}
          {% for e in metered %}
            {% set v = states(e) %}
            {% if v not in ['unknown','unavailable','none'] %}
              {% set ns.s = ns.s + (v | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ [ (total - ns.s) | round(1), 0 ] | max }}
  - cover:
      - name: "Portail"
        unique_id: portail_template_cover
        device_class: gate
        state: "{{ is_state('switch.sonoff_100259f3b2_1', 'on') }}"
        open_cover:
          - action: switch.turn_on
            target:
              entity_id: switch.sonoff_100259f3b2_1
        close_cover:
          - action: switch.turn_on
            target:
              entity_id: switch.sonoff_100259b4c3_1
