- id: '1709300000001'
  alias: Sécurité - Personne détectée la nuit
  description: Envoie une notification push avec capture caméra lorsqu'une personne
    est détectée par les caméras extérieures la nuit
  triggers:
  - trigger: state
    entity_id: binary_sensor.camera_garage_person_detected
    to: 'on'
    id: allee
  - trigger: state
    entity_id: binary_sensor.camera_portail_person_detected
    to: 'on'
    id: portail
  - trigger: state
    entity_id: binary_sensor.g5_bullet_personne_detectee
    to: 'on'
    id: g5_bullet
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  actions:
  - action: notify.all_mobiles
    data:
      title: Personne détectée
      message: >-
        Une personne a été détectée par
        {% if trigger.id == 'allee' %}la caméra Allée
        {% elif trigger.id == 'portail' %}la caméra Portail
        {% else %}la caméra G5 Bullet{% endif %}
      data:
        image: >-
          {% if trigger.id == 'allee' %}/api/camera_proxy/camera.camera_allee_medium_resolution_channel
          {% elif trigger.id == 'portail' %}/api/camera_proxy/camera.camera_portail_medium_resolution_channel
          {% else %}/api/camera_proxy/camera.g5_bullet_high_resolution_channel{% endif %}
        priority: high
        ttl: 0
        channel: alarm_stream
        importance: high
  mode: single
  max_exceeded: warning
