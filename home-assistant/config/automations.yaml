      title: Personne détectée
      message: Une personne a été détectée par {% if trigger.id == 'allee' %}la caméra
        Allée {% elif trigger.id == 'portail' %}la caméra Portail {% else %}la caméra
        G5 Bullet{% endif %}
      data:
        image: '{% if trigger.id == ''allee'' %}/api/camera_proxy/camera.camera_allee_medium_resolution_channel
          {% elif trigger.id == ''portail'' %}/api/camera_proxy/camera.camera_portail_medium_resolution_channel
          {% else %}/api/camera_proxy/camera.g5_bullet_high_resolution_channel{% endif
          %}'
        priority: high
        ttl: 0
        channel: alarm_stream
        importance: high
  mode: single
  max_exceeded: warning
