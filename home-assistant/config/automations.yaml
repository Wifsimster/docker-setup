- id: '1709300000004'
  alias: Batterie faible - Notification capteurs Zigbee
  description: Vérifie toutes les 6 heures si un capteur Zigbee a une batterie inférieure
    à 20% et envoie une notification
  triggers:
  - trigger: time_pattern
    hours: /6
  conditions:
  - condition: template
    value_template: >-
      {% set ns = namespace(count=0) %}
      {% for state in states.sensor %}
        {% if 'battery' in state.entity_id and state.state not in ['unknown', 'unavailable'] and state.state | float(100) < 20 and 'mobile' not in state.entity_id %}
          {% set ns.count = ns.count + 1 %}
        {% endif %}
      {% endfor %}
      {{ ns.count > 0 }}
  actions:
  - action: notify.all_mobiles
    data:
      title: Batterie faible
      message: >-
        {% set ns = namespace(sensors=[]) %}
        {% for state in states.sensor %}
          {% if 'battery' in state.entity_id and state.state not in ['unknown', 'unavailable'] and state.state | float(100) < 20 and 'mobile' not in state.entity_id %}
            {% set ns.sensors = ns.sensors + [state.name ~ ' (' ~ state.state ~ '%)'] %}
          {% endif %}
        {% endfor %}
        Capteurs avec batterie faible : {{ ns.sensors | join(', ') }}
  mode: single
  max_exceeded: warning
