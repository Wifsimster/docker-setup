  description: Ferme le portail s'il est ouvert depuis plus de 1h la nuit. Nuit =
    sun.sun below_horizon (fiable, independant des cameras). Se declenche a l'ouverture
    la nuit OU au coucher du soleil si deja ouvert.
  triggers:
  - trigger: state
    entity_id: switch.sonoff_100259f3b2_1
    to: 'on'
  - trigger: state
    entity_id: sun.sun
    to: below_horizon
  conditions:
  - condition: state
    entity_id: switch.sonoff_100259f3b2_1
    state: 'on'
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  actions:
  - delay:
      hours: 1
  - condition: state
    entity_id: switch.sonoff_100259f3b2_1
    state: 'on'
  - action: switch.turn_on
    target:
      entity_id: switch.sonoff_100259b4c3_1
  - delay:
      seconds: 30
  - action: switch.turn_off
    target:
      entity_id: switch.sonoff_100259b4c3_1
  - action: notify.all_mobiles
    data:
      title: Portail ferme automatiquement
      message: Le portail a ete ferme automatiquement car il etait ouvert depuis plus
        de 1h pendant la nuit.
      data:
        priority: high
        ttl: 0
  mode: restart
- id: '1709300000001'
  alias: Sécurité - Personne détectée la nuit
  description: Notification push + image caméra quand une personne est détectée par
    les caméras extérieures la nuit OU lorsque la maison est en mode Absence (jour
    comme nuit).
