      title: Piscine - Failsafe
      message: La pompe de la piscine a été arrêtée par la sécurité (encore active
        à 22h ou après redémarrage HA)
  mode: single
  max_exceeded: warning
- id: '1709300000006'
  alias: Réveil - Simulation lever de soleil chambre parentale
  description: Allume progressivement la lumière de la chambre parentale pendant 20
    minutes avant 07h00 en semaine pour simuler un lever de soleil
  triggers:
  - trigger: time
    at: 06:40:00
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - action: light.turn_on
    data:
      brightness_pct: 1
      color_temp_kelvin: 2200
    target:
      entity_id: light.yeelight_color_0x52bf405
  - delay:
      minutes: 5
  - action: light.turn_on
    data:
      brightness_pct: 10
      color_temp_kelvin: 2500
      transition: 300
    target:
      entity_id: light.yeelight_color_0x52bf405
  - delay:
      minutes: 5
  - action: light.turn_on
    data:
      brightness_pct: 40
      color_temp_kelvin: 3200
      transition: 300
    target:
      entity_id: light.yeelight_color_0x52bf405
  - delay:
      minutes: 5
  - action: light.turn_on
    data:
      brightness_pct: 80
      color_temp_kelvin: 4000
      transition: 300
    target:
      entity_id: light.yeelight_color_0x52bf405
  - delay:
      minutes: 5
  - action: light.turn_on
    data:
      brightness_pct: 100
      color_temp_kelvin: 5000
      transition: 300
    target:
      entity_id: light.yeelight_color_0x52bf405
  mode: single
  max_exceeded: warning
- id: n8n_domotique_battery_low
  alias: n8n - Alerte batterie faible
  description: Envoie un événement à n8n quand un capteur a une batterie sous 5%
  triggers:
  - trigger: time_pattern
    hours: /6
  conditions:
  - condition: template
    value_template: "{% set ns = namespace(found=false) %} {% for state in states.sensor
      %}\n  {% if 'battery' in state.entity_id and state.state not in ['unknown',
      'unavailable'] and state.state | float(100) < 5 and 'mobile' not in state.entity_id
      %}\n    {% set ns.found = true %}\n  {% endif %}\n{% endfor %} {{ ns.found }}"
  actions:
  - action: rest_command.n8n_domotique
    data:
      payload: "{% set ns = namespace(sensors=[]) %} {% for state in states.sensor
        %}\n  {% if 'battery' in state.entity_id and state.state not in ['unknown',
        'unavailable'] and state.state | float(100) < 5 and 'mobile' not in state.entity_id
        %}\n    {% set ns.sensors = ns.sensors + [{\"entity_id\": state.entity_id,
        \"battery_level\": state.state ~ \"%\", \"friendly_name\": state.name}] %}\n
        \ {% endif %}\n{% endfor %} {\"event\": \"battery_low\", \"sensors\": {{ ns.sensors
        | tojson }}}"
  mode: single
- id: broadlink_rm4_health_alert
  alias: Alerte - Broadlink RM4 disponibilité
  description: Notifie les mobiles quand la télécommande RF/IR Broadlink RM4 passe
    hors ligne ou revient.
  triggers:
  - platform: state
    entity_id: remote.universal_remote
    to: unavailable
    for:
      minutes: 3
    id: offline
  - platform: state
    entity_id: remote.universal_remote
    from: unavailable
    id: online
  conditions:
  - condition: template
    value_template: '{{ trigger.id == ''offline'' or trigger.to_state.state not in
      [''unavailable'', ''unknown''] }}'
  actions:
  - data:
      title: "{% if trigger.id == 'offline' %}\U0001F534 Broadlink hors ligne{% else
        %}\U0001F7E2 Broadlink reconnectée{% endif %}"
      message: '{% if trigger.id == ''offline'' %}La télécommande RF/IR Broadlink
        RM4 ne répond plus sur le réseau (vérifier alimentation/WiFi).{% else %}La
        Broadlink RM4 est de nouveau en ligne.{% endif %}'
    action: notify.all_mobiles
  mode: single
