  - trigger: state
    entity_id: input_boolean.ventilation_auto_bureau
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.ventilation_auto_bureau
    state: 'on'
  - condition: template
    value_template: '{{ now().month in [5,6,7,8,9] }}'
  - condition: template
    value_template: '{{ states(''sensor.thermometre_temperature'') not in [''unknown'',''unavailable'',''none'']
      }}'
  actions:
  - if:
    - condition: template
      value_template: '{{ cible|int != states(''input_number.vitesse_ventilateur_bureau'')|int
        }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.vitesse_ventilateur_bureau
      data:
        value: '{{ cible|int }}'
  mode: single
  variables:
    cible: '{% set t = states(''sensor.thermometre_temperature'')|float(0) %}{% if
      t<25 %}0{% elif t<26.5 %}1{% elif t<28 %}2{% elif t<29.5 %}3{% elif t<31 %}4{%
      elif t<32.5 %}5{% else %}6{% endif %}'
- id: ventilo_couleur_appliquer_ir
  alias: Ventilo couleur — appliquer (IR)
  description: Envoie N cycles light off->on pour passer de la couleur précédente
    à la nouvelle. La lumière finit allumée sur la couleur choisie.
  triggers:
  - trigger: state
    entity_id: input_select.couleur_lumiere_ventilateur
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state not in [''unknown'',''unavailable'']
      and trigger.to_state.state != trigger.from_state.state }}'
  actions:
  - repeat:
      count: '{{ pas }}'
      sequence:
      - action: remote.send_command
        target:
          entity_id: remote.universal_remote
        data:
          device: fan
          command: light off
          num_repeats: 1
          delay_secs: 0.4
      - delay:
          milliseconds: 800
      - action: remote.send_command
        target:
          entity_id: remote.universal_remote
        data:
          device: fan
          command: light on
          num_repeats: 1
          delay_secs: 0.4
      - delay:
          milliseconds: 800
  mode: single
  variables:
    ordre:
    - Chaud
    - Neutre
    - Froid
    ci: '{{ ordre.index(trigger.from_state.state) if trigger.from_state.state in ordre
      else 0 }}'
    ti: '{{ ordre.index(trigger.to_state.state) if trigger.to_state.state in ordre
      else 0 }}'
    pas: '{{ (ti - ci) % 3 }}'
- id: alerte_capteur_temperature_fige
  alias: Alerte — Capteur de température figé/muet
  description: Notifie si un thermometre Zigbee ne met plus a jour sa valeur depuis
    > 12 h (device muet alors qu'il peut rester joignable).
  triggers:
  - trigger: time_pattern
    hours: /6
  - trigger: homeassistant
    event: start
  conditions:
  - condition: template
    value_template: '{{ stale | trim != '''' }}'
  actions:
  - action: notify.all_mobiles
    data:
      title: ⚠️ Capteur(s) de température figé(s)
      message: 'Ces thermomètres ne remontent plus de valeur :

        {{ stale }}


        Probable reporting Zigbee cassé → pile + reconfigure ZHA + réveil bouton.'
  mode: single
  variables:
    stale: '{% set ns = namespace(items=[]) %}{% for e in integration_entities(''zha'')
      if e.startswith(''sensor.'') and ''temperature'' in e %}{% if states[e] is not
      none and (now() - states[e].last_updated).total_seconds() > 43200 %}{% set ns.items
      = ns.items + [(state_attr(e,''friendly_name'') or e) ~ '' ('' ~ ((now() - states[e].last_updated).total_seconds()/3600)|round(0)|int
      ~ ''h sans MAJ)''] %}{% endif %}{% endfor %}{{ ns.items | join(''

      '') }}'
- id: vmc_guard_relais
  alias: VMC - relais rallumé automatiquement (garde-fou)
  description: La VMC doit tourner 24/7. Si le relais du Shelly passe à OFF, on le
    rallume et on prévient.
  triggers:
  - trigger: state
    entity_id: switch.vmc
    to: 'off'
    for:
      seconds: 5
  conditions: []
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.vmc
  - action: notify.all_mobiles
    data:
      title: VMC
      message: ⚠️ Le relais VMC a été coupé — rallumé automatiquement.
  mode: single
- id: vmc_arret_alerte
  alias: VMC arrêtée (panne moteur)
  description: Aucune consommation VMC pendant 10 min alors qu'elle devrait tourner
    -> alerte.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.vmc_puissance
    below: 1
    for:
      minutes: 10
  conditions: []
  actions:
  - action: notify.all_mobiles
    data:
      title: VMC arrêtée
      message: ⚠️ La VMC ne consomme plus rien depuis 10 min (puissance ~0 W). Vérifier
        le moteur / disjoncteur.
  mode: single
- id: volet_salon_securite_descente
  alias: 'Volet roulant salon - Securite : desactiver descente si montee active'
  description: Empeche montee+descente simultanees (protection moteur) cote salon.
  triggers:
  - trigger: state
    entity_id: switch.tasmota
    to: 'on'
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.tasmota_tasmota2
  mode: single
- id: volet_salon_securite_montee
  alias: 'Volet roulant salon - Securite : desactiver montee si descente active'
  description: Empeche montee+descente simultanees (protection moteur) cote salon.
  triggers:
  - trigger: state
    entity_id: switch.tasmota_tasmota2
    to: 'on'
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.tasmota
  mode: single
- id: trv_mode_saisonnier
  alias: Chauffage TRV - Mode saisonnier (ete OFF / hiver chauffe)
  description: 'Ete (mai-sept) : coupe tous les TRV. Hiver : remet en chauffe au demarrage
    HA et le 1er du mois. Evite les vannes actives en plein ete.'
  triggers:
  - trigger: homeassistant
    event: start
    id: boot
  - trigger: time
    at: 03:00:00
    id: daily
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ now().month in [5,6,7,8,9] }}'
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id:
          - climate.sonoff_trvzb_thermostat
          - climate.sonoff_trvzb_thermostat_2
          - climate.sonoff_trvzb_thermostat_3
          - climate.sonoff_trvzb_thermostat_4
          - climate.thermostat_salon_thermostat_5
          - climate.thermostat_thermostat
          - climate.thermostat_chambre_parentale_thermostat
        data:
          hvac_mode: 'off'
    - conditions:
      - condition: template
        value_template: '{{ now().month not in [5,6,7,8,9] and (trigger.id == ''boot''
          or now().day == 1) }}'
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id:
          - climate.sonoff_trvzb_thermostat
          - climate.sonoff_trvzb_thermostat_2
          - climate.sonoff_trvzb_thermostat_3
          - climate.sonoff_trvzb_thermostat_4
          - climate.thermostat_salon_thermostat_5
          - climate.thermostat_thermostat
          - climate.thermostat_chambre_parentale_thermostat
        data:
          hvac_mode: heat
  mode: single
- id: presence_absence_armement
  alias: Présence - Armement mode Absence (tous partis 10 min)
  description: 'Quand tout le monde est not_home depuis 10 min : coupe le chauffe-eau,
    active la sécurité caméra 24/7 et notifie. Ne s''arme que si les 2 personnes sont
    géolocalisées not_home.'
  triggers:
  - trigger: state
    entity_id:
    - person.wifsimster
    - person.christelle
  conditions:
  - condition: template
    value_template: '{{ states(''person.wifsimster'') == ''not_home'' and states(''person.christelle'')
      == ''not_home'' }}'
  actions:
  - delay:
      minutes: 10
  - condition: template
    value_template: '{{ states(''person.wifsimster'') == ''not_home'' and states(''person.christelle'')
      == ''not_home'' }}'
  - condition: state
    entity_id: input_boolean.maison_absente
    state: 'off'
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.maison_absente
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.chauffe_eau_absence
  - action: notify.all_mobiles
    data:
      title: "\U0001F3E0 Maison en mode Absence"
      message: Tout le monde est parti. Chauffe-eau coupé, détection personne caméra
        active 24/7.
  mode: restart
- id: presence_absence_desarmement
  alias: Présence - Désarmement mode Absence (retour)
  description: 'Dès que quelqu''un rentre : désactive le mode absence, rétablit le
    chauffe-eau (planning) et notifie.'
  triggers:
  - trigger: state
    entity_id: person.wifsimster
    to: home
  - trigger: state
    entity_id: person.christelle
    to: home
  conditions:
  - condition: state
    entity_id: input_boolean.maison_absente
    state: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.maison_absente
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.chauffe_eau_absence
  - action: notify.all_mobiles
    data:
      title: "\U0001F3E0 Bon retour"
      message: Mode Absence désactivé — chauffe-eau rétabli selon le planning.
  mode: single
- id: frigo_congelateur_alerte_conso
  alias: Alerte panne frigo congélateur
