    entity_id: binary_sensor.camera_garage_person_detected
    to: 'on'
    id: allee
  - trigger: state
    entity_id: binary_sensor.camera_portail_person_detected
    to: 'on'
    id: portail
  - trigger: state
    entity_id: binary_sensor.g5_bullet_personne_detectee
    to: 'on'
    id: g5_bullet
  conditions:
  - condition: or
