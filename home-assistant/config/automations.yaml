- id: '1709300000004'
  alias: Batterie faible - Notification capteurs Zigbee
  description: Verifie toutes les 6h si un capteur Zigbee a une batterie entre 5%
    et 20% (le seuil <5% critique est gere par le workflow n8n).
  triggers:
  - trigger: time_pattern
    hours: /6
  conditions:
  - condition: template
    value_template: "{% set ns = namespace(count=0) %} {% for state in states.sensor
      %}\n  {% if 'battery' in state.entity_id and state.state not in ['unknown',
      'unavailable'] and 5 <= state.state | float(100) < 20 and 'mobile' not in state.entity_id
      %}\n    {% set ns.count = ns.count + 1 %}\n  {% endif %}\n{% endfor %} {{ ns.count
      > 0 }}"
  actions:
  - action: notify.all_mobiles
    data:
      title: Batterie faible
      message: "{% set ns = namespace(sensors=[]) %} {% for state in states.sensor
        %}\n  {% if 'battery' in state.entity_id and state.state not in ['unknown',
        'unavailable'] and 5 <= state.state | float(100) < 20 and 'mobile' not in
        state.entity_id %}\n    {% set ns.sensors = ns.sensors + [state.name ~ ' ('
        ~ state.state ~ '%)'] %}\n  {% endif %}\n{% endfor %} Capteurs avec batterie
        faible : {{ ns.sensors | join(', ') }}"
  mode: single
  max_exceeded: warning
- id: '1709300000005'
