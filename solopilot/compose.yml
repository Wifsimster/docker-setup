name: solopilot

services:
  solopilot:
    image: ghcr.io/wifsimster/solopilot:latest
    container_name: solopilot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - WEB_PORT=3000
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qS http://localhost:3000/healthz 2>&1 | grep -q 'HTTP/'"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.solopilot.entrypoints=websecure"
      - "traefik.http.routers.solopilot.rule=Host(`solopilot.${DOMAIN}`) || Host(`x-ai-weekly-bot.${DOMAIN}`)"
      - "traefik.http.services.solopilot.loadBalancer.server.port=3000"
    cap_drop:
      - ALL
    networks:
      lan:

volumes:
  bot-data:
    name: solopilot_bot-data
    external: true

networks:
  lan:
    external: true
