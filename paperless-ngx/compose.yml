name: paperless-ngx

services:
  db:
    container_name: paperless-db
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperless}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lan
      - backend

  redis:
    container_name: paperless-redis
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  gotenberg:
    container_name: paperless-gotenberg
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
      - "--api-timeout=60s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

  tika:
    container_name: paperless-tika
    image: apache/tika:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  protonmail-bridge:
    container_name: protonmail-bridge
    build: ./protonmail-bridge
    image: protonmail-bridge-libfido2:latest
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 1025:25/tcp
      - 1143:143/tcp
    restart: unless-stopped
    volumes:
      - proton_bridge_data:/root
    networks:
      - lan
      - backend

  webserver:
    container_name: paperless-webserver
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
      tika:
        condition: service_started
      protonmail-bridge:
        condition: service_started
    volumes:
      - paperless_data:/usr/src/paperless/data
      - /mnt/media/documents:/usr/src/paperless/media
      - paperless_export:/usr/src/paperless/export
      - /mnt/media/paperless-inbox:/usr/src/paperless/consume
    environment:
      - USERMAP_UID=1000
      - USERMAP_GID=1000
      - PAPERLESS_URL=https://paperless.${DOMAIN}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_OCR_LANGUAGE=fra+eng
      - PAPERLESS_TIME_ZONE=Europe/Paris
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://paperless-gotenberg:3000
      - PAPERLESS_TIKA_ENDPOINT=http://paperless-tika:9998
      - PAPERLESS_TASK_WORKERS=2
      - PAPERLESS_WEBSERVER_WORKERS=2
      - PAPERLESS_CONSUMER_RECURSIVE=true
      - PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS=true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"

      # Entrypoint
      - "traefik.http.routers.paperless.entrypoints=websecure"

      # Router
      - "traefik.http.routers.paperless.rule=Host(`paperless.${DOMAIN}`)"

      # Service
      - "traefik.http.services.paperless.loadBalancer.server.port=8000"
      - "traefik.http.routers.paperless.middlewares=tinyauth@docker"

      # API router — bypass tinyauth for mobile/API clients (token auth handled by Paperless)
      - "traefik.http.routers.paperless-api.entrypoints=websecure"
      - "traefik.http.routers.paperless-api.rule=Host(`paperless.${DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/accounts/`))"
      - "traefik.http.routers.paperless-api.service=paperless"
      - "traefik.http.routers.paperless-api.priority=100"
      - "traefik.http.routers.paperless-api.tls=true"

      # Watchtower automatic update
      - "com.centurylinklabs.watchtower.enable=true"

    networks:
      - lan
      - backend

  paperless-ai:
    container_name: paperless-ai
    image: clusterzx/paperless-ai:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - paperless_ai_data:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - PAPERLESS_AI_PORT=3000
    depends_on:
      webserver:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless-ai.entrypoints=websecure"
      - "traefik.http.routers.paperless-ai.rule=Host(`paperless-ai.${DOMAIN}`)"
      - "traefik.http.services.paperless-ai.loadBalancer.server.port=3000"
      - "traefik.http.routers.paperless-ai.middlewares=tinyauth@docker"
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - lan
      - backend

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  paperless_data:
    driver: local
  paperless_export:
    driver: local
  paperless_ai_data:
    driver: local
  proton_bridge_data:
    driver: local

networks:
  lan:
    external: true
  backend:
    internal: true

