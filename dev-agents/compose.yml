name: dev-agents

services:
  dev-agents:
    container_name: dev-agents
    image: ghcr.io/wifsimster/devteam:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /mnt/media/data/workspace:/workspace
      - /home/wifsimster/.claude:/home/node/.claude
      - ./agent.py:/app/agent.py:ro
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - MAX_TURNS=${MAX_TURNS:-50}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dev-agents.entrypoints=websecure"
      - "traefik.http.routers.dev-agents.rule=Host(`devteam.${DOMAIN}`)"
      - "traefik.http.services.dev-agents.loadBalancer.server.port=8585"
    networks:
      - lan

networks:
  lan:
    external: true
