name: dev-agents

services:
  dev-agents:
    container_name: dev-agents
    build: .
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /mnt/media/data/workspace:/workspace
      - /home/wifsimster/.claude:/home/node/.claude
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - MAX_TURNS=${MAX_TURNS:-50}
    networks:
      - lan

networks:
  lan:
    external: true
